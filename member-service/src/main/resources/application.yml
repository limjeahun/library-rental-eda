server:
  port: 8082

swagger:
  title: Member Service API
  description: Library member service API
  version: v1.0.0
  contact:
    name: Library Team
    email: support@example.com

spring:
  application:
    name: member-service
  datasource:
    url: jdbc:mariadb://localhost:3306/member_db
    username: library
    password: library
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      group-id: member
      max-poll-records: 10
    properties:
      schema.registry.url: http://localhost:8085
  data:
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    consumer:
      processing:
        ttl: 10m
    topics:
      rental-rent: rental_rent
      rental-return: rental_return
      overdue-clear: overdue_clear
      rental-result: rental_result
      point-use: point_use
  failure:
    force-overdue-clear-fail: false
