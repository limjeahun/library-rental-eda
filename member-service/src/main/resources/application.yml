server:
  port: 8082

spring:
  application:
    name: member-service
  datasource:
    url: jdbc:mariadb://localhost:3306/member_db
    username: library
    password: library
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: member
  data:
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    topics:
      rental-rent: rental_rent
      rental-return: rental_return
      overdue-clear: overdue_clear
      rental-result: rental_result
      point-use: point_use
  failure:
    force-overdue-clear-fail: false
