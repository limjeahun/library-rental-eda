server:
  port: 8080

spring:
  application:
    name: rental-service
  datasource:
    url: jdbc:mariadb://localhost:3306/rental_db
    username: library
    password: library
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: rental
  data:
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    topics:
      rental-rent: rental_rent
      rental-return: rental_return
      overdue-clear: overdue_clear
      rental-result: rental_result
      point-use: point_use
