server:
  port: 8084

swagger:
  title: Bestbook Service API
  description: Library bestbook read model service API
  version: v1.0.0
  contact:
    name: Library Team
    email: support@example.com

spring:
  application:
    name: bestbook-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: bestbook
    properties:
      schema.registry.url: http://localhost:8085
  data:
    mongodb:
      uri: mongodb://localhost:27017/bestbook_db
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    consumer:
      processing:
        ttl: 10m
    topics:
      rental-rent: rental_rent
      rent-cancel: rent_cancel
