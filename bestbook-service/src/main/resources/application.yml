server:
  port: 8084

spring:
  application:
    name: bestbook-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: bestbook
  data:
    mongodb:
      uri: mongodb://localhost:27017/bestbook_db
    redis:
      host: localhost
      port: 6379

app:
  kafka:
    consumer:
      processing:
        ttl: 10m
    topics:
      rental-rent: rental_rent
      rent-cancel: rent_cancel
