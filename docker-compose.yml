services:
  mariadb:
    image: mariadb:11.4
    container_name: library-mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: library
      MARIADB_PASSWORD: library
    volumes:
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: library-redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:7.0
    container_name: library-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d

  kafka:
    build:
      context: ./docker/kafka
      args:
        KAFKA_IMAGE: apache/kafka:3.9.0
        JMX_EXPORTER_VERSION: 1.5.0
    image: library-kafka-jmx:3.9.0
    container_name: library-kafka
    ports:
      - "19092:9092"
      - "7071:7071"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OPTS: "-javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent.jar=7071:/opt/jmx_exporter/kafka-jmx.yml"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: library-schema-registry
    depends_on:
      - kafka
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: library-kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list; do sleep 3; done &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rental_rent --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rental_return --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic overdue_clear --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rental_result --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic point_use --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rent_cancel --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic return_cancel --partitions 4 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic overdue_clear_cancel --partitions 4 --replication-factor 1
      "

  rental-service:
    build:
      context: .
      dockerfile: docker/service/Dockerfile
      args:
        SERVICE_NAME: rental-service
    image: library-rental-service:local
    container_name: library-rental-service
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
      schema-registry:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/rental_db
      SPRING_DATASOURCE_USERNAME: library
      SPRING_DATASOURCE_PASSWORD: library
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_TAGS_APPLICATION: rental-service

  book-service:
    build:
      context: .
      dockerfile: docker/service/Dockerfile
      args:
        SERVICE_NAME: book-service
    image: library-book-service:local
    container_name: library-book-service
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
      schema-registry:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/book_db
      SPRING_DATASOURCE_USERNAME: library
      SPRING_DATASOURCE_PASSWORD: library
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_TAGS_APPLICATION: book-service

  member-service:
    build:
      context: .
      dockerfile: docker/service/Dockerfile
      args:
        SERVICE_NAME: member-service
    image: library-member-service:local
    container_name: library-member-service
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
      schema-registry:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/member_db
      SPRING_DATASOURCE_USERNAME: library
      SPRING_DATASOURCE_PASSWORD: library
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_TAGS_APPLICATION: member-service

  bestbook-service:
    build:
      context: .
      dockerfile: docker/service/Dockerfile
      args:
        SERVICE_NAME: bestbook-service
    image: library-bestbook-service:local
    container_name: library-bestbook-service
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      schema-registry:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8084:8084"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
      SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/bestbook_db?serverSelectionTimeoutMS=30000&connectTimeoutMS=10000&socketTimeoutMS=60000"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_METRICS_TAGS_APPLICATION: bestbook-service

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: library-kafka-exporter
    depends_on:
      - kafka
    command:
      - "--kafka.server=kafka:29092"
      - "--web.listen-address=:9308"
    ports:
      - "9308:9308"

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0
    container_name: library-cadvisor
    privileged: true
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: library-prometheus
    depends_on:
      - kafka
      - kafka-exporter
      - cadvisor
      - loki
      - alloy
    ports:
      - "19090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.7.0
    container_name: library-loki
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  alloy:
    image: grafana/alloy:v1.16.1
    container_name: library-alloy
    user: "0:0"
    depends_on:
      - loki
    ports:
      - "12345:12345"
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind:
          create_host_path: false
      - alloy-data:/var/lib/alloy/data

  grafana:
    image: grafana/grafana:12.3.3
    container_name: library-grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_LANGUAGE: ko-KR
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  k6:
    image: grafana/k6:latest
    profiles:
      - perf
    depends_on:
      rental-service:
        condition: service_started
      book-service:
        condition: service_started
      member-service:
        condition: service_started
      bestbook-service:
        condition: service_started
      prometheus:
        condition: service_started
    volumes:
      - ./performance/k6:/scripts:ro
    environment:
      MEMBER_URL: http://member-service:8082
      BOOK_URL: http://book-service:8081
      RENTAL_URL: http://rental-service:8080
      BESTBOOK_URL: http://bestbook-service:8084
      K6_TARGET_VUS: ${K6_TARGET_VUS:-20}
      K6_RAMP_UP: ${K6_RAMP_UP:-30s}
      K6_STEADY_DURATION: ${K6_STEADY_DURATION:-1m}
      K6_RAMP_DOWN: ${K6_RAMP_DOWN:-30s}
      ASYNC_TIMEOUT_SECONDS: ${ASYNC_TIMEOUT_SECONDS:-10}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1}
      SERVICE_READY_TIMEOUT_SECONDS: ${SERVICE_READY_TIMEOUT_SECONDS:-120}
      VERIFY_BESTBOOK: ${VERIFY_BESTBOOK:-true}
      PRE_REGISTERED_BOOK_COUNT: ${PRE_REGISTERED_BOOK_COUNT:-300}
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_PUSH_INTERVAL: 1s
      K6_PROMETHEUS_RW_TREND_STATS: "p(90),p(95),p(99),avg,min,max"
    command: ["run", "-o", "experimental-prometheus-rw", "/scripts/rental-flow.js"]

volumes:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
